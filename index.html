<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web File Runner Ver.1.2</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/monokai.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    
    <style>
        /* CSS変数によるテーマ管理 (ダークモード対応) */
        :root {
            --bg-body: #f1f5f9;
            --bg-panel: #ffffff;
            --bg-header: #f8fafc;
            --text-main: #334155;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --danger-color: #ef4444;
            --tab-active-bg: #ffffff;
            --splitter-bg: #cbd5e1;
            --radius-md: 8px;
            --radius-lg: 12px;
        }
        
        /* ダークモード時の色設定 */
        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-panel: #1e293b;
            --bg-header: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --primary-color: #6366f1;
            --primary-hover: #818cf8;
            --tab-active-bg: #1e293b;
            --splitter-bg: #475569;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-body); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        button { cursor: pointer; font-family: inherit; border: none; background: none; color: inherit; }
        svg { width: 1.2em; height: 1.2em; }
        
        header, .controls { background-color: var(--bg-panel); border-bottom: 1px solid var(--border-color); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .controls { padding: 8px 16px; background-color: var(--bg-header); }
        .header-title { font-size: 1.25rem; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .header-actions, .action-buttons { display: flex; gap: 12px; align-items: center; }
        
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius-md); font-size: 0.875rem; font-weight: 600; transition: 0.2s; }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-outline { border: 1px solid var(--border-color); background-color: transparent; }
        .btn-outline:hover { background-color: var(--border-color); }
        
        .workspace { display: flex; flex: 1; padding: 16px; gap: 8px; overflow: hidden; }
        .panel { background-color: var(--bg-panel); border: 1px solid var(--border-color); border-radius: var(--radius-lg); display: flex; flex-direction: column; overflow: hidden; flex: 1; min-width: 0; }
        .panel-header { background-color: var(--bg-header); border-bottom: 1px solid var(--border-color); padding: 8px 16px; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; font-weight: bold; }
        .panel-content { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        
        /* スプリッター (画面の幅をドラッグで調整するバー) */
        .splitter { width: 8px; cursor: col-resize; background-color: var(--bg-body); position: relative; display: flex; align-items: center; justify-content: center; z-index: 10; margin: 0 4px; border-radius: 4px;}
        .splitter::after { content: ''; width: 4px; height: 30px; background-color: var(--splitter-bg); border-radius: 2px; }
        .splitter:hover::after, .splitter:active::after { background-color: var(--primary-color); }
        
        /* タブ */
        .file-tabs-container { display: flex; background-color: var(--bg-header); border-bottom: 1px solid var(--border-color); align-items: center; overflow-x: auto; scrollbar-width: none; }
        .file-tab { padding: 8px 16px; font-size: 0.85rem; border-right: 1px solid var(--border-color); cursor: pointer; display: flex; align-items: center; gap: 8px; border-bottom: 2px solid transparent; }
        .file-tab.active { background-color: var(--tab-active-bg); color: var(--primary-color); border-bottom-color: var(--primary-color); font-weight: bold; }
        .file-tab-title { cursor: text; }
        .file-tab-delete { color: var(--text-muted); cursor: pointer; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-weight: bold;}
        .file-tab-delete:hover { background-color: var(--danger-color); color: white; }
        #add-file-btn { padding: 0 16px; font-size: 1.2rem; font-weight: bold; color: var(--primary-color); }

        /* エディタ＆プレビュー */
        .CodeMirror { height: 100%; font-family: ui-monospace, SFMono-Regular, monospace; font-size: 14px; }
        iframe { width: 100%; height: 100%; border: none; background: white; }
        
        /* モーダル */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.2s; z-index: 9999; backdrop-filter: blur(2px);}
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--bg-panel); padding: 24px; border-radius: var(--radius-lg); width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-content input { width: 100%; padding: 10px; margin: 12px 0; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-body); color: var(--text-main); font-family: monospace;}
        .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }

        .toggle-switch { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <div class="header-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/></svg>
            Web File Runner <span style="font-size: 0.7em; color: var(--text-muted); font-weight: normal;">Ver.1.2</span>
        </div>
        <div class="header-actions">
            <label class="toggle-switch">
                <input type="checkbox" id="theme-toggle" style="display:none;">
                🌙 ダークモード
            </label>
            <label class="toggle-switch">
                <input type="checkbox" id="autorun-toggle" checked style="display:none;">
                ⚡ 自動実行
            </label>
            <button id="reset-btn" class="btn btn-outline" style="color: var(--danger-color); border-color: var(--danger-color);">全クリア</button>
        </div>
    </header>

    <div class="controls">
        <label class="btn btn-outline" style="cursor:pointer;">
            📂 ファイルを開く
            <input type="file" id="file-input" accept=".html,.js,.css,.txt,image/*,audio/*,video/*" multiple style="display:none;">
        </label>
        <div class="action-buttons">
            <button id="download-btn" class="btn btn-outline">📥 完成品を保存</button>
            <button id="run-btn" class="btn btn-primary">▶ コードを実行</button>
        </div>
    </div>

    <div class="workspace">
        <div class="panel" id="editor-panel">
            <div class="panel-header">🖋 エディタ</div>
            <div class="file-tabs-container">
                <div id="file-tabs" style="display:flex; flex:1; overflow-x:auto;"></div>
                <button id="add-file-btn" title="新規ファイル作成">+</button>
            </div>
            <div class="panel-content">
                <textarea id="editor"></textarea>
            </div>
        </div>

        <div class="splitter" id="splitter" title="ドラッグで幅を調整"></div>

        <div class="panel" id="preview-panel">
            <div class="panel-header">
                👁 プレビュー
                <button id="fullscreen-btn" class="btn btn-outline" style="padding: 2px 8px; font-size: 0.75rem;">全画面</button>
            </div>
            <div class="panel-content">
                <iframe id="preview-frame" sandbox="allow-scripts allow-modals allow-same-origin allow-forms allow-popups"></iframe>
            </div>
        </div>
    </div>

    <div id="file-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="file-modal-title">ファイル名</h3>
            <input type="text" id="file-name-input" placeholder="例: style.css">
            <p id="file-modal-error" style="color:var(--danger-color); font-size:0.8rem; display:none; margin-top:-8px;">無効な名前か、既に存在します。</p>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="document.getElementById('file-modal').classList.remove('active')">キャンセル</button>
                <button id="file-modal-save" class="btn btn-primary">保存</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
